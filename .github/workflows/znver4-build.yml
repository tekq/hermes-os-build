name: Znver4 Parallel Optimization
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. SCANNER (Remains same)
  scanner:
    runs-on: ubuntu-latest
    container: fedora:43
    outputs:
      packages: ${{ steps.check.outputs.packages }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Python
        run: dnf install -y python3
      - name: Run Hit List Check
        id: check
        run: |
          UPDATES=$(python3 check_updates.py | grep "Triggering build for:" | sed 's/Triggering build for: //')
          echo "packages=$UPDATES" >> $GITHUB_OUTPUT

  # 2. GENERAL BUILDER (Simpler packages)
  build:
    needs: scanner
    if: needs.scanner.outputs.packages != '' && needs.scanner.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git python3
      - name: Build Simple
        run: |
          PKGS=$(echo "${{ needs.scanner.outputs.packages }}" | tr -d "[]'," | sed -E 's/(glibc|binutils|elfutils|systemd)//g') 
          if [ -z "$PKGS" ]; then
            echo "No general packages to build."
            exit 0
          fi
          for pkg in $PKGS; do
            echo "--- Processing $pkg ---"
            dnf download --source $pkg
            dnf builddep -y $pkg-*.src.rpm
            mkdir -p bin_output
            rpm -ivh $pkg-*.src.rpm
            sed -i '1i %global optflags %{optflags} -march=znver4 -mtune=znver4 -mprefer-vector-width=512 -O3 -flto=thin' ~/rpmbuild/SPECS/*.spec
            rpmbuild -bb ~/rpmbuild/SPECS/*.spec \
              --nocheck \
              --define "_rpmdir $(pwd)/bin_output" \
              --define "debug_package %{nil}" \
              --define "_annotated_build 0"
            mkdir -p ./x86_64/
            cp bin_output/x86_64/*.rpm ./x86_64/
            rm -rf bin_output/* ~/rpmbuild/SPECS/* $pkg-*.src.rpm
          done
      - name: Upload General Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-general
          path: x86_64/*.rpm
  build-glibc:
    needs: scanner
    if: contains(needs.scanner.outputs.packages, 'glibc')
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git
      - name: Build Glibc
        run: |
          dnf download --source glibc
          dnf builddep -y glibc-*.src.rpm
          rpm -ivh glibc-*.src.rpm
          SPEC=$(find $HOME/rpmbuild/SPECS -name "glibc.spec" | head -n 1)

          sed -i '1i %global optflags %{optflags} -march=znver4 -mtune=znver4 -mprefer-vector-width=512 -O3 -flto=thin' "$SPEC"
          sed -i '/%configure/ s/$/ --enable-x86-64-v4/' "$SPEC"
          sed -i 's/make install/make install LOCALEDEF=\/usr\/bin\/localedef/g' "$SPEC"
          sed -i '1i %global with_doc 0' "$SPEC"
          sed -i '1i %global run_glibc_tests 0' "$SPEC"

          mkdir -p bin_output
          rpmbuild -bb "$SPEC" --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
          
          mkdir -p ./out/x86_64
          cp bin_output/x86_64/*.rpm ./out/x86_64/ || true
      - name: Upload Glibc Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-glibc
          path: out/x86_64/*.rpm
  # 3. BINUTILS & ELFUTILS SPECIALIST
  build-utils:
    needs: scanner
    if: |
      contains(needs.scanner.outputs.packages, 'binutils') || 
      contains(needs.scanner.outputs.packages, 'elfutils')
    runs-on: ubuntu-latest
    container: 
      image: fedora:43
      options: --privileged # Mock requires privileged mode for chroot
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Build Tools
        run: |
          dnf install -y mock rpm-build rpmspectool dnf-plugins-core
          # Add the current user to the mock group
          usermod -a -G mock $(whoami)
      - name: Build Utils via Mock
        run: |
          TARGETS=""
          [[ "${{ needs.scanner.outputs.packages }}" == *"binutils"* ]] && TARGETS="$TARGETS binutils"
          [[ "${{ needs.scanner.outputs.packages }}" == *"elfutils"* ]] && TARGETS="$TARGETS elfutils"

          # Create a custom mock config to inject Zen4 flags globally
          mkdir -p custom_mock
          cat /etc/mock/fedora-43-x86_64.cfg > custom_mock/znver4.cfg
          cat << 'EOF' >> custom_mock/znver4.cfg
          config_opts['macros']['%_annotated_build'] = '0'
          config_opts['macros']['%_hardened_build'] = '0'
          config_opts['macros']['%optflags'] = '-O3 -march=znver4 -mtune=znver4 -mprefer-vector-width=512 -O3 -flto=thin -g'
          config_opts['macros']['%_nocheck'] = '1'
          config_opts['macros']['%_distro_extra_cflags'] = '-march=znver4 -mtune=znver4 -mprefer-vector-width=512 -O3 -flto=thin -O3'
          config_opts['macros']['%_distro_extra_cxxflags'] = '-march=znver4 -mtune=znver4 -mprefer-vector-width=512 -O3 -flto=thin -O3'
          EOF

          for pkg in $TARGETS; do
            dnf download --source $pkg
            
            # Use mock to build the SRPM into a binary RPM
            # --nocheck is passed to bypass tests
            mock -r $(pwd)/custom_mock/znver4.cfg \
                 --resultdir=$(pwd)/specialist_staging \
                 --rebuild $pkg-*.src.rpm \
                 --nocheck

            rm -f $pkg-*.src.rpm
          done
      - name: Upload Specialist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-specialists
          path: specialist_staging/*.rpm

  # 4. SYSTEMD SPECIALIST
  build-systemd:
    needs: scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upgrade Docker Engine
        run: |
          sudo apt update
          sudo apt install -y ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          
          sudo apt update
          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
          sudo systemctl restart docker
          # CRITICAL: Pre-pull the image so the action doesn't skip the step
          docker pull fedora:43

      - name: Set up QEMU (Host Side)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
        env:
          QEMU_CPU: max
          
      - name: Build in Fedora Container
        uses: maus007/docker-run-action-fork@v1
        with:
          image: fedora:43
          options: -v ${{ github.workspace }}:/workspace --privileged
          # Force a clean bash execution to ignore the action's weird formatting
          run: |
            set -e
            dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git qemu-user-static patch curl
            mkdir -p /workspace/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
            dnf download --source systemd
            dnf builddep -y systemd-*.src.rpm
            dnf -y in bpftool docbook-style-xsl kernel-devel xen-devel
            rpm -ivh systemd-*.src.rpm --define "_topdir /workspace/rpmbuild"
            SPEC=$(find /workspace/rpmbuild/SPECS -name "systemd.spec" | head -n 1)
            curl -L https://raw.githubusercontent.com/tekq/fhp-build-experimental/refs/heads/main/systemd-patches.diff?token=GHSAT0AAAAAADU657YBHDOG7GMHDL2QBWD22MOI7UA > /workspace/znver4.diff
            patch "$SPEC" < /workspace/znver4.diff 
            rpmbuild -bb "$SPEC" \
              --nocheck \
              --define "_topdir /workspace/rpmbuild" \
              --define "debug_package %{nil}" \
              --define "_smp_mflags -j2" \
              --define "run_tests 0" \
              --define "bootstrap 1" \
              --define "_validate_unit_files 0" \
              --define "make_check 0"            
            mkdir -p /workspace/out/x86_64
            find /workspace/rpmbuild/RPMS/x86_64/ -name "*.rpm" -exec cp {} /workspace/out/x86_64/ +
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-systemd
          path: out/x86_64/*.rpm          
  deploy:
    needs: [build, build-utils, build-systemd, build-glibc]
    if: always() && (needs.build.result == 'success' || needs.build-glibc.result == 'success' || needs.build-utils.result == 'success' || needs.build-systemd.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming_rpms/
          merge-multiple: true
      - name: Generate Repo and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sudo apt-get update && sudo apt-get install -y createrepo-c
          mkdir -p x86_64
          mv -f incoming_rpms/*.rpm x86_64/ 2>/dev/null || true
          touch .nojekyll
          createrepo_c x86_64/
          git add .nojekyll x86_64/
          git diff-index --quiet HEAD || (git commit -m "Zen4 update: Low-profile cross-compile" && git push)
