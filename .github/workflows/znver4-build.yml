name: Znver4 Parallel Optimization
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. LIGHTWEIGHT SCANNER
  scanner:
    runs-on: ubuntu-latest
    container: fedora:43
    outputs:
      packages: ${{ steps.check.outputs.packages }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Python
        run: dnf install -y python3
      - name: Run Hit List Check
        id: check
        run: |
          UPDATES=$(python3 check_updates.py | grep "Triggering build for:" | sed 's/Triggering build for: //')
          echo "packages=$UPDATES" >> $GITHUB_OUTPUT

  # 2. GENERAL BUILDER
  build:
    needs: scanner
    if: needs.scanner.outputs.packages != '' && needs.scanner.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git python3
      - name: Build Loop
        run: |
          PKGS=$(echo "${{ needs.scanner.outputs.packages }}" | tr -d "[]'," | sed -E 's/(glibc|binutils|elfutils|systemd)//g')
          if [ -z "$PKGS" ]; then exit 0; fi

          for pkg in $PKGS; do
            dnf download --source $pkg
            dnf builddep -y $pkg-*.src.rpm
            rpm -ivh $pkg-*.src.rpm
            SPEC_FILE=$(find $HOME/rpmbuild/SPECS -name "*.spec" | head -n 1)
            
            sed -i '1i %global _optflags -O3 -march=znver4 -mtune=znver4 -g' "$SPEC_FILE"
            
            mkdir -p bin_output
            rpmbuild -bb "$SPEC_FILE" --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
            
            mkdir -p ./staging
            find bin_output/ -name "*.rpm" -exec mv {} ./staging/ \;
            rm -rf bin_output/* $HOME/rpmbuild/SPECS/* $pkg-*.src.rpm
          done
      - name: Upload General Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-general
          path: staging/*.rpm

  # 3. LOW-LEVEL SPECIALISTS (binutils, elfutils)
  build-utils:
    needs: scanner
    if: |
      contains(needs.scanner.outputs.packages, 'binutils') || 
      contains(needs.scanner.outputs.packages, 'elfutils')
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git
      - name: Build Utils
        run: |
          TARGETS=""
          [[ "${{ needs.scanner.outputs.packages }}" == *"binutils"* ]] && TARGETS="$TARGETS binutils"
          [[ "${{ needs.scanner.outputs.packages }}" == *"elfutils"* ]] && TARGETS="$TARGETS elfutils"

          dnf install -y sysprof-capture-devel

          for pkg in $TARGETS; do
            dnf download --source $pkg
            dnf builddep -y $pkg-*.src.rpm
            rpm -ivh $pkg-*.src.rpm
            SPEC=$(find $HOME/rpmbuild/SPECS -name "$pkg.spec" | head -n 1)

            Z4_FLAGS="-O3 -march=znver4 -mtune=znver4"
            
            if [ "$pkg" == "binutils" ]; then
                # Use Macro-level injection to avoid breaking 'configure' probes
                sed -i "1i %global build_cflags %{optflags} $Z4_FLAGS" "$SPEC"
                sed -i "1i %global build_cxxflags %{optflags} $Z4_FLAGS" "$SPEC"
                
                # Force binutils to realize it cannot run its own output
                sed -i 's/native ? 1/native ? 0/g' "$SPEC"
                sed -i '/%configure/ s/$/ --enable-x86-64-v4/' "$SPEC"
            fi

            if [ "$pkg" == "elfutils" ]; then
                sed -i "1i %global build_cflags %{optflags} $Z4_FLAGS" "$SPEC"
            fi

            sed -i 's/%check/ %check \n exit 0/g' "$SPEC"
            sed -i '1i %global with_doc 0' "$SPEC"
            sed -i '1i %define _nocheck 1' "$SPEC"

            mkdir -p bin_output
            rpmbuild -bb "$SPEC" --target x86_64 --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
            
            mkdir -p ./specialist_staging
            find bin_output/ -name "*.rpm" -exec mv {} ./specialist_staging/ \;
            rm -rf bin_output/* $HOME/rpmbuild/SPECS/*
          done
      - name: Upload Specialist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-specialists
          path: specialist_staging/*.rpm

  # 4. GLIBC SPECIALIST
  build-glibc:
    needs: scanner
    if: contains(needs.scanner.outputs.packages, 'glibc')
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git
      - name: Build Glibc
        run: |
          dnf download --source glibc
          dnf builddep -y glibc-*.src.rpm
          rpm -ivh glibc-*.src.rpm
          SPEC=$(find $HOME/rpmbuild/SPECS -name "glibc.spec" | head -n 1)

          sed -i '1i %global optflags %{optflags} -march=znver4 -mtune=znver4' "$SPEC"
          sed -i '/%configure/ s/$/ --enable-x86-64-v4/' "$SPEC"
          sed -i 's/make install/make install LOCALEDEF=\/usr\/bin\/localedef/g' "$SPEC"
          sed -i '1i %global with_doc 0' "$SPEC"
          sed -i '1i %global run_glibc_tests 0' "$SPEC"

          mkdir -p bin_output
          rpmbuild -bb "$SPEC" --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
          
          mkdir -p ./out/x86_64
          cp bin_output/x86_64/*.rpm ./out/x86_64/ || true
      - name: Upload Glibc Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-glibc
          path: out/x86_64/*.rpm

  # 5. SYSTEMD SPECIALIST
  build-systemd:
    needs: scanner
    if: contains(needs.scanner.outputs.packages, 'systemd')
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git
      - name: Build systemd
        run: |
          dnf download --source systemd
          dnf builddep -y systemd-*.src.rpm
          rpm -ivh systemd-*.src.rpm
          SPEC=$(find $HOME/rpmbuild/SPECS -name "systemd.spec" | head -n 1)

          Z4_FLAGS="-O3 -march=znver4 -mtune=znver4"
          
          # Overriding build_cflags is safer for Meson than exporting CFLAGS
          # This allows the 'meson' macro to use standard flags for probing 
          # but optimized flags for the actual ninja build phase.
          sed -i "1i %global build_cflags %{optflags} $Z4_FLAGS" "$SPEC"
          sed -i "1i %global build_cxxflags %{optflags} $Z4_FLAGS" "$SPEC"
          
          dnf -y install bpftool docbook-style-xsl kernel-devel xen-devel

          mkdir -p bin_output
          rpmbuild -bb "$SPEC" --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
          
          mkdir -p ./out/x86_64
          cp bin_output/x86_64/*.rpm ./out/x86_64/ || true
      - name: Upload systemd Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-systemd
          path: out/x86_64/*.rpm

  # 6. DEPLOYMENT
  deploy:
    needs: [build, build-utils, build-glibc, build-systemd]
    if: always() && (needs.build.result == 'success' || needs.build-utils.result == 'success' || needs.build-glibc.result == 'success' || needs.build-systemd.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming_rpms/
          merge-multiple: true
      - name: Generate Repo and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          
          sudo apt-get update && sudo apt-get install -y createrepo-c
          
          mkdir -p x86_64
          mv -f incoming_rpms/*.rpm x86_64/ 2>/dev/null || true
          
          touch .nojekyll
          createrepo_c x86_64/
          
          git add .nojekyll x86_64/
          git diff-index --quiet HEAD || (git commit -m "Zen4 update: Stable specialist builds" && git push)
