name: Znver4 Build
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scanner:
    runs-on: ubuntu-latest
    container: fedora:43
    outputs:
      packages: ${{ steps.check.outputs.packages }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Python
        run: dnf install -y python3
      - name: Run Hit List Check
        id: check
        run: |
          UPDATES=$(python3 check_updates.py | grep "Triggering build for:" | sed 's/Triggering build for: //')
          echo "packages=$UPDATES" >> $GITHUB_OUTPUT

  build:
    needs: scanner
    if: needs.scanner.outputs.packages != '' && needs.scanner.outputs.packages != '[]'
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git python3
      - name: Build Loop
        run: |
          PKGS=$(echo "${{ needs.scanner.outputs.packages }}" | tr -d "[]'," | sed -E 's/(glibc|binutils|elfutils)//g')

          if [ -z "$PKGS" ]; then
            echo "No general packages to build."
            exit 0
          fi

          for pkg in $PKGS; do
            echo "--- Processing $pkg ---"
            dnf download --source $pkg
            dnf builddep -y $pkg-*.src.rpm
            mkdir -p bin_output
            rpm -ivh $pkg-*.src.rpm

            sed -i '1i %global optflags %{optflags} -march=znver4 -mtune=znver4' ~/rpmbuild/SPECS/*.spec

            rpmbuild -bb ~/rpmbuild/SPECS/*.spec \
              --nocheck \
              --define "_rpmdir $(pwd)/bin_output" \
              --define "debug_package %{nil}" \
              --define "_annotated_build 0"

            mkdir -p ./x86_64/
            cp bin_output/x86_64/*.rpm ./x86_64/
            rm -rf bin_output/* ~/rpmbuild/SPECS/* $pkg-*.src.rpm
          done
      - name: Upload General Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-general
          path: x86_64/*.rpm

  build-specials:
    needs: scanner
    if: |
      contains(needs.scanner.outputs.packages, 'glibc') || 
      contains(needs.scanner.outputs.packages, 'binutils') || 
      contains(needs.scanner.outputs.packages, 'elfutils')
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 360
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install System Tools
        run: dnf install -y rpm-build rpmspectool dnf-plugins-core gcc make git
      - name: Build Specials
        run: |
          TARGETS=""
          [[ "${{ needs.scanner.outputs.packages }}" == *"glibc"* ]] && TARGETS="$TARGETS glibc"
          [[ "${{ needs.scanner.outputs.packages }}" == *"binutils"* ]] && TARGETS="$TARGETS binutils"
          [[ "${{ needs.scanner.outputs.packages }}" == *"elfutils"* ]] && TARGETS="$TARGETS elfutils"

          # Fix missing dependencies discovered in logs
          dnf install -y sysprof-capture-devel

          for pkg in $TARGETS; do
            dnf download --source $pkg
            dnf builddep -y $pkg-*.src.rpm
            rpm -ivh $pkg-*.src.rpm
            SPEC=$(find $HOME/rpmbuild/SPECS -name "$pkg.spec" | head -n 1)

            # Global Tune for Runner Safety, March for Libraries
            sed -i '1i %global optflags %{optflags} -mtune=znver4' "$SPEC"
            
            if [ "$pkg" == "glibc" ]; then
                sed -i 's/CFLAGS="/CFLAGS="-march=znver4 /g' "$SPEC"
                sed -i '/%configure/ s/$/ --enable-x86-64-v4/' "$SPEC"
                sed -i 's/make install/make install LOCALEDEF=\/usr\/bin\/localedef/g' "$SPEC"
                sed -i '1i %global _install_langs en_US:en:C:utf-8:UTF-8' "$SPEC"
            fi

            if [ "$pkg" == "binutils" ]; then
                sed -i 's/CFLAGS="/CFLAGS="-march=znver4 /g' "$SPEC"
                sed -i '/%configure/ s/$/ --enable-x86-64-v4/' "$SPEC"
                
                # Define run_tests as a no-op at the start of %build
                sed -i '/%build/a run_tests() { :; }' "$SPEC"
                
                # Disable standard make check calls
                sed -i 's/make check/true/g' "$SPEC"
                sed -i 's/make -k check/true/g' "$SPEC"
                
                # Fix the true-gas / true-gold issues found in logs
                sed -i 's/true-gas/true/g' "$SPEC"
                sed -i 's/true-gold/true/g' "$SPEC"
                
                # NOP out the tar command and create dummy file to satisfy subsequent scripts
                sed -i 's/tar cjf/touch dummy.tar.xz; echo skipping-tar/g' "$SPEC"
                # NOP out uuencode which fails on the missing/empty tarball
                sed -i 's/uuencode/echo skipping-uuencode/g' "$SPEC"
                
                sed -i '1i %global _with_deterministic_archives 1' "$SPEC"
            fi

            if [ "$pkg" == "elfutils" ]; then
                # Elfutils libraries get Zen4 instructions
                sed -i 's/CFLAGS="/CFLAGS="-march=znver4 /g' "$SPEC"
                # Disable checks that try to execute the just-built backends
                sed -i 's/make check/true/g' "$SPEC"
                sed -i 's/%{make_build} check/true/g' "$SPEC"
            fi

            sed -i '1i %global with_doc 0' "$SPEC"
            sed -i '1i %global run_glibc_tests 0' "$SPEC"
            sed -i '1i %define _nocheck 1' "$SPEC"

            mkdir -p bin_output
            rpmbuild -bb "$SPEC" --target x86_64 --nocheck --define "_rpmdir $(pwd)/bin_output" --define "debug_package %{nil}" --define "_annotated_build 0"
            
            mkdir -p ./out/x86_64
            cp bin_output/x86_64/*.rpm ./out/x86_64/ || true
            rm -rf bin_output/* $HOME/rpmbuild/SPECS/*
          done
      - name: Upload Specialist Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-specialists
          path: out/
  deploy:
    needs: [build, build-specials]
    if: always() && (needs.build.result == 'success' || needs.build-specials.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: x86_64/
          merge-multiple: true
      - name: Generate Repo and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          sudo apt-get update && sudo apt-get install -y createrepo-c
          createrepo_c x86_64/

          git add x86_64/
          git diff-index --quiet HEAD || (git commit -m "Automated Zen4 update: General + Glibc" && git push)
