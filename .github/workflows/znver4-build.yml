name: "Build glibc (znver4)"

on:
  workflow_dispatch:
    inputs:
      fedora_release:
        description: "Fedora release version"
        default: "44"
        type: string

permissions:
  contents: write

env:
  QEMU_CPU: EPYC-Genoa

jobs:
  build-glibc:
    runs-on: ubuntu-latest
    container: fedora:${{ inputs.fedora_release || '44' }}
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build glibc with znver4 (tests enabled)
        run: |
          chmod +x scripts/patch-glibc-spec.sh scripts/build-glibc.sh
          bash scripts/build-glibc.sh scripts/patch-glibc-spec.sh

      - name: Upload glibc RPMs
        uses: actions/upload-artifact@v4
        with:
          name: glibc-znver4-rpms
          path: output/**/*.rpm
          if-no-files-found: ignore

      - name: Deploy RPMs to repository
        run: |
          dnf install -y createrepo_c git

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          mkdir -p x86_64
          cp -f output/**/*.rpm x86_64/ 2>/dev/null || true
          cp -f output/*.rpm x86_64/ 2>/dev/null || true
          touch .nojekyll

          createrepo_c x86_64/

          git add .nojekyll x86_64/
          if ! git diff-index --quiet HEAD; then
            git commit -m "build: update glibc znver4 rpms and repository metadata"
            git push
          fi
