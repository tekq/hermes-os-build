include('/etc/mock/fedora-44-x86_64.cfg')

config_opts['root'] = 'fedora-v4-x86_64'

config_opts['macros']['%__spec_build_pre'] = """
    export CFLAGS='-O3 -march=x86-64-v4 -mtune=generic'
    export CXXFLAGS='-O3 -march=x86-64-v4 -mtune=generic'
    export FFLAGS='-O3 -march=x86-64-v4 -mtune=generic'
    %__spec_build_pre
"""

config_opts['macros']['%optflags'] = '-O3 -march=x86-64-v4'
config_opts['macros']['%build_cflags'] = '%{optflags}'
config_opts['macros']['%build_cxxflags'] = '%{optflags}'

config_opts['macros']['%__cflags_arch_x86_64'] = '-march=x86-64-v4'
config_opts['macros']['%__cflags_arch_x86_64_level'] = '-march=x86-64-v4'

config_opts['macros']['%_optimization_level'] = '3'
config_opts['macros']['%optflags'] = '-O3 -march=x86-64-v4 -mtune=generic -fasynchronous-unwind-tables -fstack-clash-protection -fcf-protection'

config_opts['macros']['%_auto_set_build_flags'] = '0'

config_opts['yum.conf'] += """
[hermes-os-build]
name=hermes-os-build
baseurl=https://tekq.github.io/hermes-os-build/x86_64/
enabled=1
gpgcheck=0
priority=1

#[fedora]
#name=fedora
#metalink=https://mirrors.fedoraproject.org/metalink?repo=fedora-43&arch=x86_64
#enabled=1

#[updates]
#name=updates
#metalink=https://mirrors.fedoraproject.org/metalink?repo=updates-released-f43&arch=x86_64
#enabled=1
"""
